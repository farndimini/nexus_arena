<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Nexus Arena</title>
    <meta name="robots" content="noindex, follow">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a1a;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 120px; font-weight: 900;
            background: linear-gradient(135deg, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { font-size: 20px; color: rgba(255,255,255,0.7); margin: 20px 0 30px; }
        a {
            display: inline-block; padding: 15px 40px;
            background: linear-gradient(135deg, #00f3ff, #bc13fe);
            color: #fff; border-radius: 50px; text-decoration: none;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            text-transform: uppercase; transition: 0.3s;
        }
        a:hover { transform: translateY(-3px); box-shadow: 0 10px 40px rgba(0,243,255,0.5); }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Page not found. The game continues elsewhere.</p>
        <a href="/">Return to Nexus Arena</a>
    </div>
</body>
</html>
